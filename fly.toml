app = "jake-uptime-kuma"
primary_region = "nrt"

[build]
  image = "louislam/uptime-kuma:2"

[env]
  TZ = "Asia/Tokyo"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[vm]
  memory = "512m"

[[mounts]]
  source = "uptime_data"
  destination = "/app/data"
